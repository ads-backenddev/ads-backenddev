name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ads-backenddev
          outputs: |
            dist/github-contribution-grid-snake-dark.svg

      - name: Push snake animation
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
